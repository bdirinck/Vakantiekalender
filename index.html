<!DOCTYPE html>
<html lang="nl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Familie Caels</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0f0f13;
      --surface: #17171e;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --text: #e8e8f0;
      --text-muted: #6b6b80;
      --accent: #4f6ef7;
      --accent2: #8b5cf6;
      --error: #ff4466;
      --green: #10b981;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.35;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
      text-align: center;
    }

    .eyebrow {
      font-size: 10px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
      animation: fadeUp 0.5s ease both;
    }

    h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(40px, 10vw, 72px);
      font-weight: 800;
      letter-spacing: -2px;
      line-height: 1;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 10px;
      animation: fadeUp 0.5s 0.08s ease both;
    }

    .sub {
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 52px;
      animation: fadeUp 0.5s 0.14s ease both;
    }

    .nav {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
    }

    .nav-btn {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, transform 0.1s;
      touch-action: manipulation;
      position: relative;
      overflow: hidden;
    }

    .nav-btn::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--btn-accent, var(--accent));
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.2s ease;
    }

    .nav-btn:hover {
      background: var(--surface2);
      border-color: var(--btn-accent, var(--accent));
      transform: translateX(4px);
    }

    .nav-btn:hover::before {
      transform: scaleY(1);
    }

    .nav-btn .btn-label {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .nav-btn .btn-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--btn-accent, var(--accent));
      box-shadow: 0 0 8px var(--btn-accent, var(--accent));
      flex-shrink: 0;
    }

    .nav-btn .btn-arrow {
      font-size: 16px;
      color: var(--text-muted);
      transition: color 0.15s, transform 0.15s;
    }

    .nav-btn:hover .btn-arrow {
      color: var(--btn-accent, var(--accent));
      transform: translateX(4px);
    }

    .nav-btn .btn-year {
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 2px;
      margin-top: 3px;
      display: block;
    }

    .nav-btn-inner {
      text-align: left;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--border);
      margin: 8px 0;
      opacity: 0.5;
    }

    .footer {
      margin-top: 48px;
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 2px;
      text-transform: uppercase;
      animation: fadeUp 0.5s 0.32s ease both;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(14px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 480px) {
      .nav-btn {
        padding: 16px 18px;
        font-size: 11px;
      }
    }

    /* Locked state */
    .nav-btn.locked {
      opacity: 0.38;
      cursor: not-allowed;
      pointer-events: none;
    }

    /* Login block */
    .login-block {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 20px 24px;
      margin-bottom: 0;
    }

    .login-block.hidden {
      display: none;
    }

    .login-label {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .login-label::before {
      content: '';
      display: inline-block;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 6px var(--accent);
    }

    .login-row {
      display: flex;
      gap: 8px;
    }

    .login-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      padding: 10px 14px;
      outline: none;
      letter-spacing: 2px;
      transition: border-color 0.15s;
    }

    .login-input:focus {
      border-color: var(--accent);
    }

    .login-input.shake {
      animation: shake 0.35s ease;
      border-color: var(--error);
    }

    .login-btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #fff;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 10px 18px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: opacity 0.15s;
      white-space: nowrap;
    }

    .login-btn:hover {
      opacity: 0.85;
    }

    .login-error {
      font-size: 10px;
      color: var(--error);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 8px;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .login-error.visible {
      opacity: 1;
    }

    /* Unlocked badge */
    .unlocked-badge {
      display: none;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 10px 16px;
      border: 1px solid var(--green);
      color: var(--green);
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .unlocked-badge.visible {
      display: flex;
      animation: fadeUp 0.3s ease both;
    }

    .logout-btn {
      background: transparent;
      border: 1px solid var(--error);
      color: var(--error);
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 5px 12px;
      cursor: pointer;
      letter-spacing: 1px;
      text-transform: uppercase;
      transition: background 0.15s, opacity 0.15s;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .logout-btn:hover {
      background: var(--error);
      color: #fff;
    }

    .unlocked-badge::before {
      content: '';
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      flex-shrink: 0;
    }

    .lock-icon {
      font-size: 11px;
      color: var(--text-muted);
      margin-left: 4px;
    }

    @keyframes shake {

      0%,
      100% {
        transform: translateX(0);
      }

      20% {
        transform: translateX(-6px);
      }

      40% {
        transform: translateX(6px);
      }

      60% {
        transform: translateX(-4px);
      }

      80% {
        transform: translateX(4px);
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="eyebrow">Familie Caels &bull; Overzichten</div>
    <h1>Planning</h1>
    <div class="sub">Selecteer een overzicht</div>

    <div style="display:flex;flex-direction:column;gap:12px;width:100%;animation:fadeUp 0.5s 0.22s ease both;">

      <!-- Login block -->
      <div class="login-block" id="loginBlock">
        <div class="login-label">Vakantieoverzichten &bull; Toegang vereist</div>
        <div class="login-row">
          <input type="password" class="login-input" id="pwInput" placeholder="Paswoord" autocomplete="off"
            maxlength="32">
          <button class="login-btn" onclick="doLogin()">Bevestigen</button>
        </div>
        <div class="login-error" id="loginError">Ongeldig paswoord</div>
      </div>

      <!-- Unlocked badge -->
      <div class="unlocked-badge" id="unlockedBadge">
        <span>Vakantieoverzichten ontgrendeld</span>
        <button class="logout-btn" onclick="doLogout()">Afmelden</button>
      </div>

      <!-- Nav -->
      <nav class="nav">
        <a href="Vakantieoverzicht_2026.html" class="nav-btn locked" id="btn2026" style="--btn-accent:#4f6ef7">
          <div class="btn-label">
            <span class="btn-dot"></span>
            <div class="nav-btn-inner">
              Vakantieoverzicht <span class="lock-icon" id="lock2026">&#128274;</span>
              <span class="btn-year">2026</span>
            </div>
          </div>
          <span class="btn-arrow">&#8594;</span>
        </a>

        <a href="Vakantieoverzicht_2027.html" class="nav-btn locked" id="btn2027" style="--btn-accent:#8b5cf6">
          <div class="btn-label">
            <span class="btn-dot"></span>
            <div class="nav-btn-inner">
              Vakantieoverzicht <span class="lock-icon" id="lock2027">&#128274;</span>
              <span class="btn-year">2027</span>
            </div>
          </div>
          <span class="btn-arrow">&#8594;</span>
        </a>

        <div class="divider"></div>

        <a href="Wasverdeling.html" class="nav-btn" style="--btn-accent:#10b981">
          <div class="btn-label">
            <span class="btn-dot"></span>
            <div class="nav-btn-inner">
              Wasverdeling
              <span class="btn-year">2026</span>
            </div>
          </div>
          <span class="btn-arrow">&#8594;</span>
        </a>
      </nav>

    </div>

    <div class="footer">Ctrl+S om op te slaan &bull; ESC om af te melden</div>
  </div>

  <script>
    const PW = 'papa1928';
    const SESSION_KEY = 'fc_session';
    const SESSION_DURATION = 20 * 60 * 1000; // 20 minuten

    function unlock() {
      document.getElementById('loginBlock').classList.add('hidden');
      document.getElementById('unlockedBadge').classList.add('visible');
      document.getElementById('btn2026').classList.remove('locked');
      document.getElementById('btn2027').classList.remove('locked');
      const l2026 = document.getElementById('lock2026');
      const l2027 = document.getElementById('lock2027');
      if (l2026) l2026.remove();
      if (l2027) l2027.remove();
    }

    function isSessionValid() {
      const ts = localStorage.getItem(SESSION_KEY);
      if (!ts) return false;
      return (Date.now() - parseInt(ts, 10)) < SESSION_DURATION;
    }

    function doLogin() {
      const input = document.getElementById('pwInput');
      const err = document.getElementById('loginError');
      if (input.value === PW) {
        localStorage.setItem(SESSION_KEY, Date.now().toString());
        unlock();
      } else {
        input.classList.remove('shake');
        void input.offsetWidth;
        input.classList.add('shake');
        err.classList.add('visible');
        input.value = '';
        setTimeout(() => input.classList.remove('shake'), 400);
      }
    }

    function doLogout() {
      localStorage.removeItem(SESSION_KEY);
      location.reload();
    }

    // Auto-unlock als sessie nog geldig is
    if (isSessionValid()) {
      unlock();
    }

    document.getElementById('pwInput').addEventListener('keydown', function (e) {
      if (e.key === 'Enter') doLogin();
      document.getElementById('loginError').classList.remove('visible');
    });

    document.addEventListener('keydown', function (e) {
      if (e.key === 'Escape') doLogout();
    });
  </script>
</body>

</html>
