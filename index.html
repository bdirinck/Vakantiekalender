<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Nothing to see here</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13;
    --border: #2a2a38;
    --text: #e8e8f0;
    --text-muted: #6b6b80;
    --accent: #4f6ef7;
    --accent2: #8b5cf6;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.3;
    pointer-events: none;
  }

  .glow-orb {
    position: fixed;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(79,110,247,0.06) 0%, transparent 70%);
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    animation: pulse 6s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 0.6; transform: translate(-50%, -50%) scale(1); }
    50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.12); }
  }

  .container {
    position: relative;
    z-index: 1;
    text-align: center;
    padding: 32px 24px;
    max-width: 700px;
  }

  .message {
    font-family: 'Syne', sans-serif;
    font-size: clamp(22px, 5vw, 34px);
    font-weight: 700;
    letter-spacing: -0.5px;
    line-height: 1.55;
    color: var(--text);
  }

  .message .highlight {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .line {
    display: block;
    overflow: hidden;
  }

  .line span {
    display: inline-block;
    opacity: 0;
    transform: translateY(32px);
    filter: blur(6px);
  }

  .line:nth-child(1) span { animation: slideUp 0.8s 0.3s cubic-bezier(0.22,1,0.36,1) forwards; }
  .line:nth-child(2) span { animation: slideUp 0.8s 0.7s cubic-bezier(0.22,1,0.36,1) forwards; }
  .line:nth-child(3) span { animation: slideUp 0.8s 1.1s cubic-bezier(0.22,1,0.36,1) forwards; }

  .bar {
    width: 40px;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    margin: 32px auto 0;
    opacity: 0;
    transform: scaleX(0);
    animation: barIn 0.6s 1.7s cubic-bezier(0.22,1,0.36,1) forwards;
  }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px); filter: blur(6px); }
    to   { opacity: 1; transform: translateY(0);    filter: blur(0); }
  }

  @keyframes barIn {
    from { opacity: 0; transform: scaleX(0); }
    to   { opacity: 1; transform: scaleX(1); }
  }
</style>
</head>
<body>

<div class="glow-orb"></div>

<div class="container">
  <div class="message">
    <span class="line"><span>Technofobe reacties hebben</span></span>
    <span class="line"><span>ervoor gezorgd dat hier</span></span>
    <span class="line"><span><span class="highlight">niets meer</span> te zien is.</span></span>
  </div>

  <div class="bar"></div>
</div>

</body>
</html>
