<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Familie Caels</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #17171e; --surface2: #1e1e28;
    --border: #2a2a38; --text: #e8e8f0; --text-muted: #6b6b80;
    --accent: #4f6ef7; --accent2: #8b5cf6;
    --error: #ff4466;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 560px;
    text-align: center;
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 14px;
    animation: fadeUp 0.5s ease both;
  }

  h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(40px, 10vw, 72px);
    font-weight: 800;
    letter-spacing: -2px;
    line-height: 1;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 10px;
    animation: fadeUp 0.5s 0.08s ease both;
  }

  .sub {
    font-size: 11px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 52px;
    animation: fadeUp 0.5s 0.14s ease both;
  }

  .nav {
    display: flex;
    flex-direction: column;
    gap: 12px;
    width: 100%;
    animation: fadeUp 0.5s 0.22s ease both;
  }

  .nav-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    letter-spacing: 1px;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s, transform 0.1s;
    touch-action: manipulation;
    position: relative;
    overflow: hidden;
  }

  .nav-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--btn-accent, var(--accent));
    transform: scaleY(0);
    transform-origin: bottom;
    transition: transform 0.2s ease;
  }

  .nav-btn:hover {
    background: var(--surface2);
    border-color: var(--btn-accent, var(--accent));
    transform: translateX(4px);
  }

  .nav-btn:hover::before {
    transform: scaleY(1);
  }

  .nav-btn .btn-label { display: flex; align-items: center; gap: 12px; }
  .nav-btn .btn-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--btn-accent, var(--accent));
    box-shadow: 0 0 8px var(--btn-accent, var(--accent));
    flex-shrink: 0;
  }
  .nav-btn .btn-arrow {
    font-size: 16px;
    color: var(--text-muted);
    transition: color 0.15s, transform 0.15s;
  }
  .nav-btn:hover .btn-arrow {
    color: var(--btn-accent, var(--accent));
    transform: translateX(4px);
  }
  .nav-btn .btn-year {
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 2px;
    margin-top: 3px;
    display: block;
  }

  .nav-btn-inner { text-align: left; }

  .divider {
    width: 100%;
    height: 1px;
    background: var(--border);
    margin: 8px 0;
    opacity: 0.5;
  }

  .footer {
    margin-top: 48px;
    font-size: 9px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: fadeUp 0.5s 0.32s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .nav-btn { padding: 16px 18px; font-size: 11px; }
  }

  /* Modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    padding: 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    max-width: 360px;
    width: 100%;
  }
  .modal h2 {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    margin-bottom: 6px;
    letter-spacing: -0.5px;
  }
  .modal .modal-sub {
    font-size: 10px;
    color: var(--text-muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .modal-field { margin-bottom: 16px; }
  .modal-field label {
    display: block;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 6px;
  }
  .modal-field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    letter-spacing: 2px;
  }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-field input.error { border-color: var(--error); }
  .error-msg {
    font-size: 10px;
    color: var(--error);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 6px;
    display: none;
  }
  .error-msg.visible { display: block; }
  .modal-actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
    justify-content: flex-end;
  }
  .btn-modal {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 9px 16px;
    cursor: pointer;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: all 0.15s;
  }
  .btn-modal:hover { background: var(--border); }
  .btn-modal.confirm {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
  }
  .btn-modal.confirm:hover { opacity: 0.85; }
  .lock-icon {
    font-size: 10px;
    color: var(--text-muted);
    margin-left: 6px;
    vertical-align: middle;
  }
</style>
</head>
<body>
<div class="container">
  <div class="eyebrow">Familie Caels &bull; Overzichten</div>
  <h1>Planning</h1>
  <div class="sub">Selecteer een overzicht</div>

  <nav class="nav">
    <a href="Vakantieoverzicht_2026.html" class="nav-btn" style="--btn-accent:#4f6ef7" onclick="return checkPw()">
      <div class="btn-label">
        <span class="btn-dot"></span>
        <div class="nav-btn-inner">
          Vakantieoverzicht <span class="lock-icon">&#128274;</span>
          <span class="btn-year">2026</span>
        </div>
      </div>
      <span class="btn-arrow">&#8594;</span>
    </a>

    <a href="Vakantieoverzicht_2027.html" class="nav-btn" style="--btn-accent:#8b5cf6" onclick="return checkPw()">
      <div class="btn-label">
        <span class="btn-dot"></span>
        <div class="nav-btn-inner">
          Vakantieoverzicht <span class="lock-icon">&#128274;</span>
          <span class="btn-year">2027</span>
        </div>
      </div>
      <span class="btn-arrow">&#8594;</span>
    </a>

    <div class="divider"></div>

    <a href="Wasverdeling.html" class="nav-btn" style="--btn-accent:#10b981">
      <div class="btn-label">
        <span class="btn-dot"></span>
        <div class="nav-btn-inner">
          Wasverdeling
          <span class="btn-year">2026</span>
        </div>
      </div>
      <span class="btn-arrow">&#8594;</span>
    </a>
  </nav>

  <div class="footer">Ctrl+S om op te slaan &bull; ESC om af te melden</div>
</div>

<script>
  function checkPw() {
    const pw = prompt('Paswoord:');
    if (pw === null) return false;
    if (pw === 'papa1928') return true;
    alert('Ongeldig paswoord.');
    return false;
  }
</script>
</body>
</html>
