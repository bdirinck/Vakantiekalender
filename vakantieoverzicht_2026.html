<!-- Hieronder staat de volledige HTML die je direct kunt opslaan als vakantieoverzicht_2026.html en openen in een browser.

Functies:

Klik of sleep over werkdagen om vakantie in/uit te vullen per persoon
Namen en kleuren aanpassen via het potlood-icoon
Belgische feestdagen 2026 automatisch ingekleurd
Opslaan in de browser (localStorage, blijft bewaard na herladen)
Exporteren als CSV
Sneltoetsen: toets 1-6 om persoon te wisselen, Ctrl+S om op te slaan

-->

<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vakantieoverzicht familie Caels 2026</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f0f13; --surface: #17171e; --surface2: #1e1e28;
    --border: #2a2a38; --text: #e8e8f0; --text-muted: #6b6b80;
    --accent: #4f6ef7; --accent2: #8b5cf6;
    --weekend: #1a1a24; --weekend-text: #44445a;
    --holiday: #2d1f00; --holiday-accent: #f59e0b;
    --vacation: #ff4466; --vacation-bg: #2d0011;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Mono', monospace; min-height: 100vh; padding: 32px 24px; }
  .header { display: flex; align-items: flex-end; justify-content: space-between; margin-bottom: 32px; flex-wrap: wrap; gap: 16px; }
  .title-block h1 { font-family: 'Syne', sans-serif; font-size: clamp(28px,5vw,52px); font-weight: 800; letter-spacing: -1px; line-height: 1; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .title-block .sub { font-size: 11px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; margin-top: 6px; }
  .controls { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 11px; padding: 8px 16px; cursor: pointer; letter-spacing: 1px; text-transform: uppercase; transition: all 0.15s; }
  .btn:hover { background: var(--border); border-color: var(--accent); }
  .btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn-danger { border-color: var(--vacation); color: var(--vacation); }
  .btn-danger:hover { background: var(--vacation-bg); }
  .legend { display: flex; gap: 20px; margin-bottom: 24px; flex-wrap: wrap; padding: 12px 16px; background: var(--surface); border: 1px solid var(--border); }
  .legend-item { display: flex; align-items: center; gap: 8px; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }
  .legend-dot { width: 12px; height: 12px; flex-shrink: 0; }
  .persons-bar { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; align-items: center; }
  .person-tag { display: flex; align-items: center; gap: 6px; padding: 6px 12px; background: var(--surface); border: 1px solid var(--border); font-size: 11px; cursor: pointer; transition: all 0.15s; }
  .person-tag.selected { border-width: 2px; }
  .person-tag .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
  .calendar-wrapper { overflow-x: auto; border: 1px solid var(--border); background: var(--surface); }
  table { border-collapse: collapse; min-width: max-content; }
  .month-header th { font-family: 'Syne', sans-serif; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 10px 0; text-align: center; background: var(--surface2); border-right: 2px solid var(--border); border-bottom: 1px solid var(--border); color: var(--text-muted); position: sticky; top: 0; z-index: 10; }
  .month-header th.name-col { width: 130px; min-width: 130px; background: var(--bg); border-right: 2px solid var(--border); color: var(--text-muted); font-size: 10px; letter-spacing: 3px; left: 0; z-index: 20; }
  .month-header th.month-active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .day-num-row th, .day-name-row th { font-size: 9px; text-align: center; padding: 3px 0; width: 22px; min-width: 22px; background: var(--surface2); border-right: 1px solid var(--border); color: var(--text-muted); position: sticky; top: 0; z-index: 10; }
  .day-num-row th.name-col, .day-name-row th.name-col { background: var(--bg); left: 0; z-index: 20; border-right: 2px solid var(--border); }
  .day-num-row th.is-weekend, .day-name-row th.is-weekend { color: var(--weekend-text); background: var(--weekend); }
  .day-num-row th.is-holiday, .day-name-row th.is-holiday { color: var(--holiday-accent); background: var(--holiday); }
  .person-row td { width: 22px; min-width: 22px; height: 28px; text-align: center; vertical-align: middle; border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); cursor: pointer; font-size: 9px; transition: background 0.08s; user-select: none; }
  .person-row td.name-cell { font-size: 11px; font-weight: 500; padding: 0 12px; text-align: left; cursor: default; border-right: 2px solid var(--border); white-space: nowrap; position: sticky; left: 0; z-index: 5; background: var(--surface); min-width: 130px; width: 130px; }
  .person-row td.is-weekend { background: var(--weekend); cursor: default; }
  .person-row td.is-holiday { background: var(--holiday); cursor: default; }
  .person-row td.is-vacation { background: var(--vacation-bg) !important; cursor: pointer; }
  .person-row td.is-vacation::after { content: ''; display: block; width: 6px; height: 6px; border-radius: 50%; background: var(--vacation); margin: 0 auto; box-shadow: 0 0 6px var(--vacation); }
  .person-row td.is-workday:hover { background: rgba(79,110,247,0.15); }
  .month-sep { border-right: 2px solid var(--border) !important; }
  .name-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; margin-right: 8px; }
  .status-bar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--bg); border: 1px solid var(--border); border-top: none; font-size: 10px; color: var(--text-muted); letter-spacing: 1px; flex-wrap: wrap; gap: 8px; }
  .vacation-counts { display: flex; gap: 16px; flex-wrap: wrap; }
  .count-item { display: flex; align-items: center; gap: 6px; }
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); padding: 32px; max-width: 400px; width: 90%; }
  .modal h2 { font-family: 'Syne', sans-serif; font-size: 20px; margin-bottom: 20px; }
  .modal-field { margin-bottom: 16px; }
  .modal-field label { display: block; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 6px; }
  .modal-field input { width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--text); font-family: 'DM Mono', monospace; font-size: 13px; padding: 10px 12px; outline: none; }
  .modal-field input:focus { border-color: var(--accent); }
  .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
  .color-swatches { display: flex; gap: 8px; }
  .swatch { width: 28px; height: 28px; border: 2px solid transparent; cursor: pointer; transition: transform 0.1s; }
  .swatch:hover { transform: scale(1.15); }
  .swatch.selected { border-color: #fff; }
</style>
</head>
<body>
<div class="header">
  <div class="title-block">
    <h1>Vakantie familie Caels 2026</h1>
    <div class="sub">Teamoverzicht &bull; 6 personen &bull; 365 dagen</div>
  </div>
  <div class="controls">
    <button class="btn btn-danger" onclick="clearAll()">Alles wissen</button>
    <button class="btn" onclick="exportCSV()">Exporteer CSV</button>
    <button class="btn active" onclick="saveState()">Opslaan</button>
  </div>
</div>
<div class="legend">
  <div class="legend-item"><div class="legend-dot" style="background:var(--vacation);box-shadow:0 0 6px var(--vacation);border-radius:50%"></div>Vakantie (klik of sleep)</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--holiday-accent);border-radius:2px"></div>Belgische feestdag</div>
  <div class="legend-item"><div class="legend-dot" style="background:#2a2a38;border-radius:2px"></div>Weekend</div>
  <div class="legend-item" style="margin-left:auto;color:var(--text-muted)">Toets 1-6 om persoon te selecteren &bull; Ctrl+S om op te slaan</div>
</div>
<div class="persons-bar" id="personsBar"></div>
<div class="calendar-wrapper"><table id="calTable"></table></div>
<div class="status-bar">
  <div id="statusText">Selecteer een persoon en klik op werkdagen om vakantie in te vullen.</div>
  <div class="vacation-counts" id="vacationCounts"></div>
</div>
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2>Persoon aanpassen</h2>
    <div class="modal-field"><label>Naam</label><input type="text" id="modalName" maxlength="24"></div>
    <div class="modal-field"><label>Kleur</label><div class="color-swatches" id="colorSwatches"></div></div>
    <div class="modal-actions">
      <button class="btn btn-danger" onclick="closeModal()">Annuleren</button>
      <button class="btn active" onclick="saveModal()">Opslaan</button>
    </div>
  </div>
</div>
<script>
const PERSON_COLORS=['#4f6ef7','#10b981','#f59e0b','#ec4899','#8b5cf6','#06b6d4','#f97316','#84cc16','#e11d48','#0ea5e9'];
const HOLIDAYS=new Set(['2026-01-01','2026-04-06','2026-05-01','2026-05-14','2026-05-25','2026-07-21','2026-08-15','2026-11-01','2026-11-11','2026-12-25']);
const HOLIDAY_NAMES={'2026-01-01':'Nieuwjaar','2026-04-06':'Paasmaandag','2026-05-01':'Dag van de Arbeid','2026-05-14':'OLH Hemelvaart','2026-05-25':'Pinkstermaandag','2026-07-21':'Nationale feestdag','2026-08-15':'OLV Hemelvaart','2026-11-01':'Allerheiligen','2026-11-11':'Wapenstilstand','2026-12-25':'Kerstmis'};
const MONTHS=['Jan','Feb','Mrt','Apr','Mei','Jun','Jul','Aug','Sep','Okt','Nov','Dec'];
const DAYS=['Zo','Ma','Di','Wo','Do','Vr','Za'];
let persons=[{name:'Marie-Jeanne',color:PERSON_COLORS[0]},{name:'Lilianne',color:PERSON_COLORS[1]},{name:'Patricia',color:PERSON_COLORS[2]},{name:'Luc',color:PERSON_COLORS[3]},{name:'Rony',color:PERSON_COLORS[4]},{name:'Kristl',color:PERSON_COLORS[5]}];
let vacation={};for(let i=0;i<6;i++)vacation[i]={};
let selectedPerson=0,isDragging=false,dragMode=null,editingPersonIdx=null,pendingColor=null;
function getAllDates(){const d=[];for(let m=0;m<12;m++){const dim=new Date(2026,m+1,0).getDate();for(let day=1;day<=dim;day++)d.push(new Date(2026,m,day));}return d;}
function ds(d){return d.toISOString().slice(0,10);}
function isWeekend(d){const w=d.getDay();return w===0||w===6;}
function isHoliday(d){return HOLIDAYS.has(ds(d));}
function buildCalendar(){
  const table=document.getElementById('calTable');table.innerHTML='';
  const dates=getAllDates();
  const months={};for(const d of dates){const m=d.getMonth();if(!months[m])months[m]=[];months[m].push(d);}
  const mRow=document.createElement('tr');mRow.className='month-header';
  let th=document.createElement('th');th.className='name-col';th.textContent='NAAM';mRow.appendChild(th);
  for(let m=0;m<12;m++){th=document.createElement('th');th.colSpan=months[m].length;th.textContent=MONTHS[m].toUpperCase();mRow.appendChild(th);}
  table.appendChild(mRow);
  function makeHeaderRow(cls,valFn){
    const row=document.createElement('tr');row.className=cls;
    const nt=document.createElement('th');nt.className='name-col';row.appendChild(nt);
    for(const d of dates){const t=document.createElement('th');t.textContent=valFn(d);if(isHoliday(d)){t.classList.add('is-holiday');t.title=HOLIDAY_NAMES[ds(d)]||'Feestdag';}else if(isWeekend(d))t.classList.add('is-weekend');const nx=new Date(d);nx.setDate(nx.getDate()+1);if(nx.getMonth()!==d.getMonth())t.classList.add('month-sep');row.appendChild(t);}
    table.appendChild(row);
  }
  makeHeaderRow('day-num-row',d=>d.getDate());
  makeHeaderRow('day-name-row',d=>DAYS[d.getDay()]);
  for(let p=0;p<persons.length;p++){
    const tr=document.createElement('tr');tr.className='person-row';
    const nc=document.createElement('td');nc.className='name-cell';
    nc.innerHTML=`<span class="name-dot" style="background:${persons[p].color}"></span>${persons[p].name}`;
    nc.style.color=p===selectedPerson?persons[p].color:'';
    nc.style.borderLeft=`3px solid ${p===selectedPerson?persons[p].color:'transparent'}`;
    tr.appendChild(nc);
    for(const d of dates){
      const td=document.createElement('td');const dstr=ds(d);
      const nx=new Date(d);nx.setDate(nx.getDate()+1);if(nx.getMonth()!==d.getMonth())td.classList.add('month-sep');
      if(isHoliday(d)){td.classList.add('is-holiday');td.title=HOLIDAY_NAMES[dstr]||'Feestdag';}
      else if(isWeekend(d))td.classList.add('is-weekend');
      else{
        td.classList.add('is-workday');
        if(vacation[p][dstr])td.classList.add('is-vacation');
        td.addEventListener('mousedown',e=>{e.preventDefault();isDragging=true;dragMode=vacation[p][dstr]?'remove':'add';toggle(p,dstr,td);});
        td.addEventListener('mouseenter',()=>{if(isDragging)toggle(p,dstr,td);});
      }
      tr.appendChild(td);
    }
    table.appendChild(tr);
  }
  document.addEventListener('mouseup',()=>{isDragging=false;dragMode=null;});
}
function toggle(p,dstr,td){if(dragMode==='add'){vacation[p][dstr]=true;td.classList.add('is-vacation');}else{delete vacation[p][dstr];td.classList.remove('is-vacation');}updateStatus();}
function updateStatus(){const c=document.getElementById('vacationCounts');c.innerHTML='';for(let p=0;p<persons.length;p++){const days=Object.keys(vacation[p]).length;const d=document.createElement('div');d.className='count-item';d.innerHTML=`<span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${persons[p].color};margin-right:4px"></span><span style="color:${persons[p].color}">${persons[p].name}</span>: ${days}d`;c.appendChild(d);}}
function buildPersonsBar(){const bar=document.getElementById('personsBar');bar.innerHTML='';for(let p=0;p<persons.length;p++){const tag=document.createElement('div');tag.className='person-tag'+(p===selectedPerson?' selected':'');tag.style.borderColor=p===selectedPerson?persons[p].color:'';tag.innerHTML=`<span class="dot" style="background:${persons[p].color}"></span><span style="font-size:11px;color:${p===selectedPerson?persons[p].color:'var(--text)'};cursor:pointer" onclick="selectPerson(${p})">${persons[p].name}</span><span style="color:var(--text-muted);font-size:10px;cursor:pointer;margin-left:6px" onclick="openModal(${p})" title="Bewerken">✎</span>`;bar.appendChild(tag);}}
function selectPerson(idx){selectedPerson=idx;buildPersonsBar();document.querySelectorAll('.person-row').forEach((tr,i)=>{const nc=tr.querySelector('.name-cell');if(nc){nc.style.color=i===selectedPerson?persons[i].color:'';nc.style.borderLeft=`3px solid ${i===selectedPerson?persons[i].color:'transparent'}`;}});document.getElementById('statusText').textContent=`Geselecteerd: ${persons[idx].name}. Klik of sleep over werkdagen.`;}
function openModal(idx){editingPersonIdx=idx;pendingColor=persons[idx].color;document.getElementById('modalName').value=persons[idx].name;const sw=document.getElementById('colorSwatches');sw.innerHTML='';PERSON_COLORS.forEach(c=>{const s=document.createElement('div');s.className='swatch'+(c===pendingColor?' selected':'');s.style.background=c;s.onclick=()=>{pendingColor=c;document.querySelectorAll('.swatch').forEach(x=>x.classList.remove('selected'));s.classList.add('selected');};sw.appendChild(s);});document.getElementById('modalOverlay').classList.add('open');setTimeout(()=>document.getElementById('modalName').focus(),50);}
function closeModal(){document.getElementById('modalOverlay').classList.remove('open');editingPersonIdx=null;}
function saveModal(){if(editingPersonIdx===null)return;const n=document.getElementById('modalName').value.trim()||persons[editingPersonIdx].name;persons[editingPersonIdx].name=n;persons[editingPersonIdx].color=pendingColor;closeModal();buildPersonsBar();buildCalendar();updateStatus();}
function clearAll(){if(!confirm('Alle vakantiedagen wissen?'))return;for(let p=0;p<persons.length;p++)vacation[p]={};buildCalendar();updateStatus();}
function saveState(){try{localStorage.setItem('vakantie2026',JSON.stringify({persons,vacation}));const btn=event.target;btn.textContent='Opgeslagen!';setTimeout(()=>btn.textContent='Opslaan',1500);}catch(e){alert('Opslaan mislukt (localStorage niet beschikbaar).');}}
function loadState(){try{const raw=localStorage.getItem('vakantie2026');if(!raw)return;const s=JSON.parse(raw);if(s.persons)persons=s.persons;if(s.vacation){vacation={};for(let p=0;p<persons.length;p++)vacation[p]=s.vacation[p]||{};}}catch(e){}}
function exportCSV(){const dates=getAllDates().filter(d=>!isWeekend(d)&&!isHoliday(d));let csv='Naam,'+dates.map(d=>ds(d)).join(',')+'\n';for(let p=0;p<persons.length;p++){csv+=persons[p].name+','+dates.map(d=>vacation[p][ds(d)]?'V':'').join(',')+'\n';}const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='vakantieoverzicht_2026.csv';a.click();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeModal();if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveState();}const n=parseInt(e.key);if(n>=1&&n<=6)selectPerson(n-1);});
loadState();buildPersonsBar();buildCalendar();updateStatus();selectPerson(0);
</script>
</body>
</html>
